<!doctype html>
<html>
    <head>
        <meta name="viewport" content="width=1200, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div id="scoreboard">
            <h1 id="scoreboard-heading">HOST</h1>
            <h1 class="score" id="scoreHost">0</h1>
            <div id="score-buttons">
                <button onclick="addHost1()">+1</button>
                <button onclick="addHost2()">+2</button>
                <button onclick="addHost3()">+3</button>
            </div>
            <div id="score-buttons">
                <button onclick="subtractHost1()">-1</button>
                <button onclick="subtractHost2()">-2</button>
                <button onclick="subtractHost3()">-3</button>
            </div>
            <button class="reset" onclick="resetHost()">RESET</button>
        </div>
        <div id="scoreboard">
            <h1 id="scoreboard-heading">GUEST</h1>
            <h1 class="score" id="scoreGuest">0</h1>
            <div id="score-buttons">
                <button onclick="addGuest1()">+1</button>
                <button onclick="addGuest2()">+2</button>
                <button onclick="addGuest3()">+3</button>
            </div>
            <div id="score-buttons">
                <button onclick="subtractGuest1()">-1</button>
                <button onclick="subtractGuest2()">-2</button>
                <button onclick="subtractGuest3()">-3</button>
            </div>
            <button class="reset" onclick="resetGuest()">RESET</button>
        </div>
        <script src="index.js"></script>
    </body>
</html>
